<!DOCTYPE html>
<html>
<head>
<title>Idhal balloon decoration</title>

<style>
body{
  background-color:black;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  width:150px;
  height:800px;
  font-family: Arial;
  text-align:center;
}

img{
  width:400px;
  height:300px;
  cursor:pointer;
  display:fixe;
  margin-left:auto;
  margin-right:auto;
}

/* popup background */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}
h1{
  top:50px;
  left:10px;
  width:300px;
  height:100px;
  font-size:30px;
  color:black;
}
h2{
  
  top:100px;
  left:10px;
  width:400px;
  height:80px;
  font-size:50px;
  color:red;
}

button{
  background: #4CAF50;
  color: white;
  font-size: 20px;
  padding: 15px 40px;
  border: none;
  border-radius: 10px;
  cursor: pointer;

  /* 3D effect */
  box-shadow: 0 8px #2e7d32;
}

/* When button is clicked */
button:active{
  box-shadow: 0 3px #2e7d32;
  transform: translateY(5px);
}


/* popup image */
#popup img{
  background: black;
  width:60%;
  margin-top:80px;
}

#close{
  background: black;   /* correct spelling */
  height: 8vh;
  align-items: center;   /* vertical center */
  justify-content: center; /* horizontal center */
  margin: 5px; 
  left: 110px;
  font-size: 30px;
  color: white;
}
.banner{
    background-image:url("img/balloon.jpg"); /* change image */
    height:300px;
    width:400px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Banner text */
.banner h1{
    color:white;
    font-size:45px;
    background:rgba(0,0,0,0.5);
    padding:45px 90px;
    border-radius:26px;
}

/* subtitle */
.banner p{
    color:white;
    font-size:20px;
    text-align:center;
}
  
</style>

</head>
<body>
<div class="banner">
   <div>
      <h1>🎈 Idhal Balloon Decoration</h1>
      <p>Grand Wedding | Birthday Party | Baby Shower</p>
   </div>
</div>

<!-- Small Image -->
<img src="img/71O+ml6GEoL._AC_UF350,350_QL80_.jpg" onclick="openPopup()">
<img src="img/img6.webp"onclick="openPopup()">
<img src="img/images (1).jpeg"onclick="openPopup()">
  <hr>
<table>
  <tr>
    <td>
      <button><a href="h4.html">Ragister</a></button>
    </td>
  </tr>
</table>


<!-- Popup -->
<div id="popup">
  <img src="img.png" style="height:400px;width:400px">
  <hr>
  <span id="close" onclick="closePopup()"><a href="h4.html"><button>Register</button></a></span>
  <button onclick="closePopup()">Close</button>
</div>
<script>
function openPopup(){
  document.getElementById("popup").style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
